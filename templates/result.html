{% extends 'base.html' %}
{% block content %}

<h2>Hello {{name}}</h2>

<p>BMI: {{bmi}}</p>
<p>Category: {{category}}</p>
<p>TDEE: {{tdee}}</p>

<form action="/goal" method="POST">
    <input type="hidden" name="weight" value="{{bmi}}">
    <input type="hidden" name="tdee" value="{{tdee}}">

    <input name="goal_weight" placeholder="Goal Weight">
    <input name="duration" placeholder="Duration (weeks)">

    <button>Get Plan</button>
</form>

{% endblock %}
