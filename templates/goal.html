{% extends 'base.html' %}
{% block content %}

<h3>Calories: {{calories}}</h3>
<p>Protein: {{protein}}</p>
<p>Carbs: {{carbs}}</p>
<p>Fat: {{fat}}</p>

<h3>Track Weight</h3>
<form action="/track" method="POST">
<input name="name" placeholder="Name">
<input name="weight" placeholder="Today's Weight">
<button>Save</button>
</form>

<a href="/plan"><button>View Plan</button></a>

{% endblock %}
